tyle="display:none"></div></div><div class="hdr-right" id="hdr-right"></div></div><div class="hdr-saved" id="hdr-saved" style="display:none">✓ salvo automaticamente</div></div><div class="screen" id="screen"></div><div class="tabs" id="tabs"><button class="tab-btn" onclick="goTab('agenda')" id="t-agenda"><span class="ic">📅</span><span id="tl-agenda" style="color:#2563EB">Agenda</span><div class="tab-dot"></div></button><button class="tab-btn" onclick="goTab('clientes')" id="t-clientes"><span class="ic">👤</span><span id="tl-clientes" style="color:#94A3B8">Clientes</span></button><button class="tab-btn" onclick="goTab('financeiro')" id="t-financeiro"><span class="ic">💰</span><span id="tl-financeiro" style="color:#94A3B8">Finanças</span></button><button class="tab-btn" onclick="goTab('config')" id="t-config"><span class="ic">⚙️</span><span id="tl-config" style="color:#94A3B8">Config</span></button></div></div>
<script>
var DAYS=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
var DAYS_F=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
var MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

var DOTS=["#2563EB","#16A34A","#DC2626","#D97706","#7C3AED","#0891B2","#BE185D","#059669"];
var PROCS=["Lipoaspiração","Abdominoplastia","Rinoplastia","Mamoplastia","Lifting facial","Bichectomia","Blefaroplastia","Gluteoplastia","Outro"];

var STATUS=[{v:"agendada",l:"Agendada",c:"#2563EB",b:"#EFF6FF"},{v:"realizada",l:"Realizada",c:"#16A34A",b:"#F0FDF4"},{v:"cancelada",l:"Cancelada",c:"#E11D48",b:"#FFF1F2"},{v:"reagendada",l:"Reagendada",c:"#D97706",b:"#FFFBEB"}];
var appts=[],pkgs=[],clients=[],tab="agenda",stack=[],calView="month",curDate=new Date(),today=new Date(),savedTimer=null,finTab="resumo",clientSearch="",evolNote="",backupMode="export",importText="";
var apptForm={},clientForm={},pkgForm={};
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function same(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function dstr(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function tstr(d){return pad(d.getHours())+":"+pad(d.getMinutes());}
function pad(n){return String(n).padStart(2,"0");}
function ddays(a,b){return Math.floor((b-a)/86400000);}
function money(v){return"R$ "+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2});}
function dayA(date){return appts.filter(function(a){return same(a.date,date);}).sort(function(a,b){return a.date-b.date;});}
function getStatus(v){return STATUS.find(function(s){return s.v===v;})||STATUS[0];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
var KEYS={a:["ag9a","ag_v8","ag_v7","ag_a_v6"],p:["ag9p","ag_p8","ag_p7"],c:["ag9c","ag_c8","ag_c7"]};
function loadStorage(){
  function tryLoad(keys){for(var i=0;i<keys.length;i++){var v=localStorage.getItem(keys[i]);if(v)return v;}return null;}
  try{
    var ra=tryLoad(KEYS.a),rp=tryLoad(KEYS.p),rc=tryLoad(KEYS.c);
    appts=ra?JSON.parse(ra).map(function(a){return Object.assign({},a,{date:new Date(a.date)});}):[];
    pkgs=rp?JSON.parse(rp):[];
    clients=rc?JSON.parse(rc):[];
  }catch(e){appts=[];pkgs=[];clients=[];}
}
function saveStorage(){
  try{
    localStorage.setItem("ag9a",JSON.stringify(appts.map(function(a){return Object.assign({},a,{date:a.date.toISOString()});})));
    localStorage.setItem("ag9p",JSON.stringify(pkgs));
    localStorage.setItem("ag9c",JSON.stringify(clients));
    var s=document.getElementById("hdr-saved");
    if(s){s.style.display="block";clearTimeout(savedTimer);savedTimer=setTimeout(function(){s.style.display="none";},2000);}
  }catch(e){}
}
function push(s){stack.push(s);render();}
function pop(){stack.pop();render();}
function goTab(t){stack=[];tab=t;render();}
function curScreen(){return stack.length?stack[stack.length-1]:null;}
function render(){
  var s=curScreen();
  var tabsEl=document.getElementById("tabs");
  var screenEl=document.getElementById("screen");
  if(s){tabsEl.style.display="none";screenEl.className="screen no-tab";}
  else{
    tabsEl.style.display="flex";screenEl.className="screen";
    ["agenda","clientes","financeiro","config"].forEach(function(t){
      document.getElementById("tl-"+t).style.color=tab===t?"#2563EB":"#94A3B8";
      var btn=document.getElementById("t-"+t);
      var dot=btn.querySelector(".tab-dot");
      if(dot)dot.style.display=tab===t?"block":"none";
    });
  }
  if(s){
    if(s.t==="apptDetail")renderApptDetail(s);
    else if(s.t==="apptForm")renderApptForm(s);
    else if(s.t==="clientDetail")renderClientDetail(s);
    else if(s.t==="clientForm")renderClientForm(s);
    else if(s.t==="pkgDetail")renderPkgDetail(s);
    else if(s.t==="pkgForm")renderPkgForm(s);
    else if(s.t==="backup")renderBackup();
  }else{
    if(tab==="agenda")renderAgenda();
    else if(tab==="clientes")renderClients();
    else if(tab==="financeiro")renderFinanceiro();
    else if(tab==="config")renderConfig();
  }
}
function setHeader(title,sub,backFn,rightHtml){
  document.getElementById("hdr-title").textContent=title;
  var subEl=document.getElementById("hdr-sub");
  if(sub){subEl.style.display="block";subEl.textContent=sub;}else{subEl.style.display="none";}
  var leftEl=document.getElementById("hdr-left");
  if(backFn){
    leftEl.innerHTML='<button class="back-btn" id="back-btn"><span>‹</span><span style="font-size:14px">Voltar</span></button>';
    document.getElementById("back-btn").onclick=backFn;
  }else{leftEl.innerHTML='<div class="logo">🌸</div>';}
  document.getElementById("hdr-right").innerHTML=rightHtml||"";
}
function navCal(dir){
  var d=new Date(curDate);
  if(calView==="month")d.setMonth(d.getMonth()+dir);
  else if(calView==="week")d.setDate(d.getDate()+dir*7);
  else d.setDate(d.getDate()+dir);
  curDate=d;render();
}
function getWeekDays(){
  var s=new Date(curDate);s.setDate(s.getDate()-s.getDay());s.setHours(0,0,0,0);
  var arr=[];for(var i=0;i<7;i++){var d=new Date(s);d.setDate(s.getDate()+i);arr.push(d);}return arr;
}
function getMonthDays(){
  var y=curDate.getFullYear(),m=curDate.getMonth();
  var first=new Date(y,m,1).getDay(),total=new Date(y,m+1,0).getDate(),cells=[];
  for(var i=0;i<first;i++)cells.push(null);
  for(var i=1;i<=total;i++)cells.push(new Date(y,m,i));
  return cells;
}
function irowHTML(icon,label,val,border){
  return'<div class="irow'+(border?" row-border":"")+'">'+'<span class="irow-icon">'+icon+'</span><div><div class="irow-label">'+label+'</div><div class="irow-val">'+val+'</div></div></div>';
}

  if(a.sessionNum)html+='<span class="badge" style="background:#F1F5F9;color:#64748B">S'+a.sessionNum+'</span>';
  if(ds!==null&&ds>=0)html+='<span class="badge" style="background:#EFF6FF;color:#2563EB">'+ds+'º pós</span>';
  html+='</div></div><span style="color:#E2E8F0;font-size:18px;flex-shrink:0">›</span></div>';
  return html;
}
function timelineHTML(date,h){
  var html='';
  HRS.forEach(function(hr){
    var sa=appts.filter(function(a){return same(a.date,date)&&a.date.getHours()===hr;}).sort(function(a,b){return a.date.getMinutes()-b.date.getMinutes();});
    var isNow=same(date,today)&&today.getHours()===hr;
    html+='<div style="display:flex;gap:10px;margin-bottom:4px">';
    html+='<div style="width:38px;flex-shrink:0;padding-top:10px;text-align:right;font-size:12px;font-weight:700;color:'+(isNow?"#2563EB":"#CBD5E1")+'">'+pad(hr)+'h</div>';
    html+='<div class="tslot'+(isNow?" now":"")+'" style="flex:1;min-height:'+h+'px;padding:'+(sa.length?"6px":"0")+'" onclick="'+(sa.length?"":"push({t:\'apptForm\',prefDate:\'"+dstr(date)+"\',prefTime:\'"+pad(hr)+":00\'})")+'">';
    if(!sa.length)html+='<div style="height:100%;min-height:'+h+'px;display:flex;align-items:center;padding-left:14px;color:'+(isNow?"rgba(37,99,235,.5)":"#E8EAED")+';font-size:12px;font-weight:600">'+(isNow?"← agora":"")+'</div>';
    sa.forEach(function(a){
      var cl=clients.find(function(c){return c.id===a.clientId;});
      var ds=cl&&cl.surgeryDate?ddays(new Date(cl.surgeryDate),new Date()):null;
      html+='<div class="appt-block" style="background:'+a.color+'12;border-left:4px solid '+a.color+'" onclick="event.stopPropagation();push({t:\'apptDetail\',id:\''+a.id+'\'})">';
      html+='<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+a.name+'</div>';
      html+='<div style="display:flex;gap:5px;margin-top:2px;flex-wrap:wrap">';
      if(a.service)html+='<span style="font-size:11px;color:#64748B">'+a.service+'</span>';
      if(a.sessionNum)html+='<span class="badge" style="background:#F1F5F9;color:#64748B">S'+a.sessionNum+'</span>';
      if(ds!==null&&ds>=0)html+='<span class="badge" style="background:#EFF6FF;color:#2563EB">'+ds+'º pós</span>';
      html+='</div></div>';
      html+='<div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:900;color:'+a.color+'">'+tstr(a.date)+'</div><div style="font-size:10px;color:#94A3B8">'+a.duration+'min</div>';

      if(a.status&&a.status!=="agendada")html+='<span class="status-badge" style="background:'+st.b+';color:'+st.c+'">'+st.l+'</span>';
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  return html;
}
</script>

  setHeader(titleMap[calView],null,null,'<button onclick="push({t:\'apptForm\',prefDate:\''+dstr(curDate)+'\',prefTime:\''+pad(Math.max(7,today.getHours()))+':00\'})" style="width:34px;height:34px;border-radius:10px;background:#2563EB;border:none;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;">+</button>');

function saveAppt(editId){
  var f=apptForm;
  if(!f.name.trim()||!f.date||!f.time)return;
  var parts=f.date.split("-"),tp=f.time.split(":");
  var date=new Date(+parts[0],+parts[1]-1,+parts[2],+tp[0],+tp[1]);
  var cid=f.clientId;
  if(!editId&&!cid&&f.name.trim()){
    var ex=clients.find(function(c){return c.name.toLowerCase()===f.name.trim().toLowerCase();});
    if(ex)cid=ex.id;
    else{cid=uid();clients.push({id:cid,name:f.name.trim(),phone:f.phone||"",birthdate:"",color:f.color,procedure:"",surgeryDate:"",surgeon:"",hospital:"",allergies:"",healthNotes:"",totalSessionsPlanned:"",evolution:[],createdAt:new Date().toISOString(),autoCreated:true});}
  }
  var data={clientId:cid,name:f.name,phone:f.phone,service:f.service,date:date,duration:+f.duration,color:f.color,notes:f.notes,type:f.type,value:f.value,paid:f.paid,pkgId:f.type==="pacote"?f.pkgId:"",sessionNum:f.sessionNum,status:f.status||"agendada"};
  if(editId){appts=appts.map(function(a){return a.id===editId?Object.assign({},a,data):a;});}
  else{appts.push(Object.assign({id:uid()},data));if(f.type==="pacote"&&f.pkgId)pkgs=pkgs.map(function(p){return p.id===f.pkgId?Object.assign({},p,{usedSessions:p.usedSessions+1}):p;});}
  saveStorage();pop();
}

  setHeader(p.clientName,p.service||"Pacote",pop);
  var html='<div style="padding:14px 16px;padding-bottom:30px"><div class="card card-pad" style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:14px;font-weight:700;color:#64748B">Sessões utilizadas</span><span style="font-size:16px;font-weight:900">'+p.usedSessions+' / '+p.totalSessions+'</span></div><div style="height:10px;border-radius:10px;background:#F1F5F9;overflow:hidden;margin-bottom:8px"><div style="height:100%;border-radius:10px;background:'+p.color+';width:'+pct+'%"></div></div><div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:#94A3B8">'+pct+'% utilizado</span><span style="font-size:14px;font-weight:900;color:#2563EB">'+money(p.totalValue)+'</span></div><div style="margin-top:6px;font-size:12px;color:#94A3B8">'+money(perS)+' por sessão</div></div>';
  html+='<div style="display:flex;gap:10px"><button onclick="togglePkg(\''+p.id+'\')" style="flex:1;padding:13px;background:'+(p.active?"#FFFBEB":"#F0FDF4")+';border:1.5px solid '+(p.active?"#FED7AA":"#BBF7D0")+';border-radius:14px;color:'+(p.active?"#D97706":"#16A34A")+';font-weight:800;font-size:14px;">'+(p.active?"⏸ Encerrar":"▶ Reativar")+'</button><button onclick="removePkg(\''+p.id+'\')" style="flex:1;padding:13px;background:#FFF1F2;border:1.5px solid #FECDD3;border-radius:14px;color:#E11D48;font-weight:800;font-size:14px;">🗑 Excluir</button></div></div>';
  document.getElementById("screen").innerHTML=html;
}
function togglePkg(id){pkgs=pkgs.map(function(p){return p.id===id?Object.assign({},p,{active:!p.active}):p;});saveStorage();push({t:"pkgDetail",id:id});stack.splice(stack.length-2,1);render();}
function removePkg(id){pkgs=pkgs.filter(function(p){return p.id!==id;});appts=appts.map(function(a){return a.pkgId===id?Object.assign({},a,{pkgId:"",type:"avulsa"}):a;});saveStorage();stack=[];tab="financeiro";render();}
function renderConfig(){
  setHeader("Configurações",null,null);
  var html='<div style="padding:14px;padding-bottom:30px"><div class="card" style="margin-bottom:16px"><div style="padding:14px 16px;border-bottom:1px solid #F1F5F9"><div style="font-size:14px;font-weight:800">💾 Backup</div><div style="font-size:12px;color:#94A3B8;margin-top:2px">Salve seus dados para não perder nada</div></div>';
  html+='<button onclick="push({t:\'backup\'})" style="width:100%;padding:14px 16px;background:#fff;border:none;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid #F1F5F9;text-align:left"><span style="font-size:22px">⬇️</span><div style="flex:1;text-align:left"><div style="font-size:14px;font-weight:700">Exportar backup</div><div style="font-size:12px;color:#94A3B8">Copie para o app Notas</div></div><span style="font-size:18px;color:#E2E8F0">›</span></button>';
  html+='<button onclick="push({t:\'backup\'})" style="width:100%;padding:14px 16px;background:#fff;border:none;display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left"><span style="font-size:22px">⬆️</span><div style="flex:1;text-align:left"><div style="font-size:14px;font-weight:700">Importar backup</div><div style="font-size:12px;color:#94A3B8">Cole o backup salvo nas Notas</div></div><span style="font-size:18px;color:#E2E8F0">›</span></button></div>';
  html+='<div class="card card-pad" style="margin-bottom:16px"><div style="font-size:14px;font-weight:800;margin-bottom:12px">📊 Estatísticas</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  [["👤","Pacientes",clients.length],["📅","Agendamentos",appts.length],["📦","Pacotes",pkgs.length],["✅","Realizadas",appts.filter(function(a){return a.date<today;}).length]].forEach(function(item){html+='<div style="background:#F8F9FB;border-radius:12px;padding:12px 14px"><div style="font-size:18px;margin-bottom:4px">'+item[0]+'</div><div style="font-size:22px;font-weight:900">'+item[2]+'</div><div style="font-size:11px;color:#94A3B8;font-weight:600;margin-top:1px">'+item[1]+'</div></div>';});
  html+='</div></div><div style="padding:14px 16px;background:#F5F3FF;border-radius:16px"><div style="font-size:13px;font-weight:800;color:#7C3AED;margin-bottom:4px">💡 Usar como app no iPhone</div><div style="font-size:12px;color:#6D28D9;line-height:1.6">Abra no <strong>Safari</strong> → <strong>Compartilhar</strong> → <strong>"Adicionar à Tela de Início"</strong></div></div></div>';
  document.getElementById("screen").innerHTML=html;
}
var backupMode="export",importText="";
function renderBackup(){
  var data=JSON.stringify({appts:appts.map(function(a){return Object.assign({},a,{date:a.date.toISOString()});}),pkgs:pkgs,clients:clients});
  setHeader("Backup",null,pop);
  var html='<div style="padding:14px 16px;padding-bottom:30px"><div style="display:flex;gap:6px;margin-bottom:16px"><button onclick="backupMode=\'export\';renderBackup()" style="flex:1;padding:9px;border-radius:11px;border:1.5px solid '+(backupMode==="export"?"#2563EB":"#E2E8F0")+';background:'+(backupMode==="export"?"#EFF6FF":"#fff")+';color:'+(backupMode==="export"?"#2563EB":"#64748B")+';font-weight:700;font-size:13px">⬇️ Exportar</button><button onclick="backupMode=\'import\';renderBackup()" style="flex:1;padding:9px;border-radius:11px;border:1.5px solid '+(backupMode==="import"?"#16A34A":"#E2E8F0")+';background:'+(backupMode==="import"?"#F0FDF4":"#fff")+';color:'+(backupMode==="import"?"#16A34A":"#64748B")+';font-weight:700;font-size:13px">⬆️ Importar</button></div>';
  if(backupMode==="export"){
    html+='<div style="background:#FFFBEB;border-radius:14px;padding:14px 16px;margin-bottom:14px;border:1px solid #FED7AA"><div style="font-size:13px;font-weight:800;color:#D97706;margin-bottom:6px">📋 Como fazer backup:</div><div style="font-size:12px;color:#92400E;line-height:1.7">1. Toque em <strong>Copiar</strong> abaixo<br>2. Abra o app <strong>Notas</strong><br>3. Crie uma nota nova e <strong>cole</strong><br>4. Salve a nota</div></div>';
    html+='<textarea id="backupTA" readonly onclick="this.select()" style="width:100%;height:160px;padding:12px;background:#F8F9FB;border:1.5px solid #E2E8F0;border-radius:12px;font-size:11px;font-family:monospace;color:#334155;resize:none;outline:none;line-height:1.4">'+esc(data)+'</textarea>';
    html+='<button onclick="doCopy()" style="width:100%;margin-top:10px;padding:14px;background:#2563EB;border:none;border-radius:14px;color:#fff;font-weight:900;font-size:15px;cursor:pointer">📋 Copiar Backup</button>';
  }else{
    html+='<div style="background:#F0FDF4;border-radius:14px;padding:14px 16px;margin-bottom:14px;border:1px solid #BBF7D0"><div style="font-size:13px;font-weight:800;color:#16A34A;margin-bottom:4px">Como restaurar:</div><div style="font-size:12px;color:#166534;line-height:1.6">Abra as Notas, copie o texto do backup e cole aqui.</div></div>';
    html+='<textarea id="importTA" oninput="importText=this.value" placeholder="Cole aqui o texto do backup..." style="width:100%;height:160px;padding:12px;background:#F8F9FB;border:1.5px solid #E2E8F0;border-radius:12px;font-size:11px;font-family:monospace;color:#334155;resize:none;outline:none;line-height:1.4">'+esc(importText)+'</textarea>';
    html+='<button onclick="doImport()" style="width:100%;margin-top:10px;padding:14px;background:#16A34A;border:none;border-radius:14px;color:#fff;font-weight:900;font-size:15px;cursor:pointer">✅ Restaurar Backup</button>';
  }
  html+='</div>';
  document.getElementById("screen").innerHTML=html;
}
function doCopy(){var ta=document.getElementById("backupTA");ta.select();if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(ta.value).then(function(){alert("Copiado! Cole no app Notas.");}).catch(function(){alert("Selecione o texto e copie manualmente.");});}else{try{document.execCommand("copy");alert("Copiado!");}catch(e){alert("Selecione e copie manualmente.");}}}
function doImport(){var txt=importText.trim();if(!txt){alert("Cole o texto do backup primeiro.");return;}try{var d=JSON.parse(txt);if(d.appts)appts=d.appts.map(function(a){return Object.assign({},a,{date:new Date(a.date)});});if(d.pkgs)pkgs=d.pkgs;if(d.clients)clients=d.clients;saveStorage();importText="";stack=[];tab="agenda";alert("Backup restaurado!");render();}catch(e){alert("Texto inválido. Copie o backup completo.");}}
loadStorage();
render();
</script>
</body>
</html>
